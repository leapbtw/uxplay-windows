name: build mdns (on demand)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout (optional)
        uses: actions/checkout@v4

      - name: Download mDNSResponder source
        run: |
          git clone -b rel/mDNSResponder-214 https://github.com/apple-oss-distributions/mDNSResponder.git --depth 1 mdns214

      - name: Patch missing headers (fix build errors)
        shell: pwsh
        run: |
          (Get-Content mdns214\mDNSShared\dnssd_clientstub.c) `
            -replace '#include "dnssd_clientstub.h"', '#include "dnssd_clientstub.h"`n#include <stdio.h>`n#include <stdlib.h>' `
            | Set-Content mdns214\mDNSShared\dnssd_clientstub.c

          Add-Content mdns214\mDNSWindows\DLL\dllmain.c "`n#include <stdlib.h>"

      - name: Build dnssd.dll
        shell: pwsh
        run: |
          $msbuild = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe"

          copy dnssd.vcxproj mdns214\mDNSWindows\DLL\dnssd.vcxproj

          & $msbuild mdns214\mDNSWindows\DLL\dnssd.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /m

      - name: Verify build output
        shell: pwsh
        run: |
          if (!(Test-Path mdns214\mDNSWindows\DLL\x64\Release\dnssd.dll)) {
            Write-Error "dnssd.dll build failed"
            exit 1
          }

      - name: Prepare artifacts
        shell: pwsh
        run: |
          mkdir output

          copy mdns214\mDNSShared\dns_sd.h output\dns_sd.h
          copy mdns214\mDNSWindows\DLL\x64\Release\dnssd.lib output\dnssd.lib
          copy mdns214\mDNSWindows\DLL\x64\Release\dnssd.dll output\dnssd.dll

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mdns-windows
          path: output
