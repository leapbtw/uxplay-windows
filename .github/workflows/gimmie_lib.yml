name: build mdns (on demand)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone mDNSResponder
        run: |
          git clone -b rel/mDNSResponder-214 https://github.com/apple-oss-distributions/mDNSResponder.git --depth 1 mdns214

      - name: Patch broken build flags (IMPORTANT)
        run: |
          # disable Apple's broken malloc/free confusion
          (Get-Content mdns214\mDNSWindows\DLL\dnssd.vcxproj) `
            -replace "<RuntimeLibrary>MultiThreaded</RuntimeLibrary>", "<RuntimeLibrary>MultiThreadedDLL</RuntimeLibrary>" |
            Set-Content mdns214\mDNSWindows\DLL\dnssd.vcxproj

      - name: Build dnssd.lib only (ignore install nonsense)
        run: |
          $msbuild = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe"

          & $msbuild mdns214\mDNSWindows\DLL\dnssd.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:PlatformToolset=v143 `
            /p:UseEnv=true `
            /m

      - name: Collect outputs
        run: |
          mkdir output
          copy mdns214\mDNSShared\dns_sd.h output\dns_sd.h
          copy mdns214\mDNSWindows\DLL\x64\Release\dnssd.lib output\dnssd.lib
          copy mdns214\mDNSWindows\DLL\x64\Release\dnssd.dll output\dnssd.dll

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mdns-windows
          path: output
